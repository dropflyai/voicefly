name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to Production
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=dropflyai
        env:
          VERCEL_ORG_ID: team_IJNzXNHM4C7c1GI1G56tAfbl
          VERCEL_PROJECT_ID: prj_9WyIiOk2gfybZtz3zSIgfO3cNkT5
